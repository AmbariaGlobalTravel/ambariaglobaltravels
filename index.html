<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ambaria Global Travels | The Royal Standard Of Travel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght=500;700;800&family=Playfair+Display:ital,wght=1,500;1,600&family=Poppins:wght=300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* --- ALL-IN-ONE SYSTEM STYLES --- */
        :root {
            --gold: #D4AF37;
            --light-gold: #F3E5AB;
            --dark-blue: #0A192F;
            --deep-navy: #050C18;
            --light-bg: #F4F6F9;
            --white: #FFFFFF;
            --text-dark: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            color: var(--text-dark);
            background-color: var(--light-bg);
            line-height: 1.6;
        }

        /* --- NAVIGATION BAR --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: rgba(10, 25, 47, 0.95);
            border-bottom: 2px solid var(--gold);
            z-index: 1000;
            padding: 10px 20px;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo img {
            height: 55px;
            width: auto;
            display: block;
            object-fit: contain;
        }

        .nav-menu {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-menu a {
            color: var(--white);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .nav-menu a:hover {
            color: var(--gold);
        }

        .btn-book {
            background-color: var(--gold);
            color: var(--dark-blue);
            padding: 10px 20px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .btn-book:hover {
            background-color: var(--white);
            transform: translateY(-2px);
        }

        /* --- HERO SECTION WITH FIXED UNIFIED SCROLLING --- */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white);
            overflow: hidden;
            background: 
                linear-gradient(135deg, rgba(10, 25, 47, 0.8) 0%, rgba(5, 12, 24, 0.85) 100%),
                url('https://images.unsplash.com/photo-1578894381163-e72c17f2d45f?auto=format&fit=crop&w=1920&q=90');
            background-size: cover;
            background-position: center;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 950px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- HERO EMBEDDED LOGO STYLING --- */
        .hero-logo-container {
            margin-bottom: 20px;
            filter: drop-shadow(0px 4px 10px rgba(0, 0, 0, 0.5));
        }

        .hero-logo-container img {
            max-height: 120px;
            width: auto;
            display: block;
        }

        /* --- HIGH-END TYPOGRAPHY EMBELLISHMENTS --- */
        .hero-title {
            font-family: 'Cinzel', serif;
            font-size: 4.2rem;
            font-weight: 800;
            letter-spacing: 7px;
            margin-bottom: 5px;
            line-height: 1.2;
            background: linear-gradient(180deg, var(--white) 20%, var(--light-gold) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0px 4px 15px rgba(0, 0, 0, 0.7));
        }

        .hero-subtitle {
            font-size: 1.4rem;
            color: var(--gold);
            margin-bottom: 25px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0px 2px 8px rgba(0,0,0,0.5);
        }

        .hero-tagline {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.9rem;
            font-weight: 500;
            margin-bottom: 40px;
            color: var(--white);
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-tagline::before, .hero-tagline::after {
            content: '';
            display: inline-block;
            width: 45px;
            height: 1.5px;
            background: linear-gradient(to right, transparent, var(--gold));
            vertical-align: middle;
            margin: 0 15px;
        }

        .hero-tagline::after {
            background: linear-gradient(to left, transparent, var(--gold));
        }

        .hero-buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        /* --- SECTION STRUCTURES --- */
        section {
            padding: 80px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            text-align: center;
            font-family: 'Cinzel', serif;
            font-size: 2.5rem;
            color: var(--dark-blue);
            margin-bottom: 40px;
            position: relative;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 80px;
            height: 3px;
            background-color: var(--gold);
            margin: 10px auto 0;
        }

        /* --- CARDS GRID --- */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: var(--white);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card-img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }

        .card-content {
            padding: 25px;
        }

        .card-tag {
            color: var(--gold);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .card-title {
            font-size: 1.4rem;
            color: var(--dark-blue);
            margin-bottom: 10px;
        }

        .card-description {
            font-size: 0.95rem;
            color: #666;
            margin-bottom: 20px;
        }

        /* --- UPGRADED PREMIUM ABOUT SECTION --- */
        .about-section-premium {
            background: linear-gradient(135deg, var(--dark-blue) 0%, var(--deep-navy) 100%);
            border: 2px solid var(--gold);
            border-radius: 16px;
            padding: 60px 40px;
            margin-top: 40px;
            margin-bottom: 60px;
            box-shadow: 0 10px 30px rgba(5, 12, 24, 0.4);
        }

        .about-section-premium .section-title {
            color: var(--white);
        }

        .about-text-premium {
            max-width: 900px;
            margin: 0 auto 40px;
            text-align: center;
            font-size: 1.15rem;
            color: rgba(255, 255, 255, 0.9);
            line-height: 1.9;
        }

        /* --- BEAUTIFUL LUXURY EXECUTIVE CARDS --- */
        .exec-grid-premium {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .exec-card-premium {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.4);
            border-radius: 12px;
            padding: 30px 25px;
            text-align: center;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.05);
        }

        .exec-card-premium::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .exec-card-premium:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .exec-role-premium {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .exec-name-premium {
            font-family: 'Cinzel', serif;
            font-size: 1.6rem;
            color: var(--white);
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        .exec-meta-line {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .exec-meta-line i {
            color: var(--gold);
            font-size: 14px;
            width: 20px;
        }

        .exec-link {
            color: rgba(255, 255, 255, 0.85);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .exec-link:hover {
            color: var(--gold);
        }

        /* --- REMASTERED BEAUTIFUL CONTACT SECTION --- */
        .contact-premium-wrapper {
            background: 
                linear-gradient(135deg, rgba(10, 25, 47, 0.92) 0%, rgba(5, 12, 24, 0.96) 100%),
                url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&w=1200&q=80');
            background-size: cover;
            background-position: center;
            border-radius: 16px;
            border: 2px solid var(--gold);
            padding: 60px 40px;
            color: var(--white);
            box-shadow: 0 10px 30px rgba(5, 12, 24, 0.4);
        }

        .contact-premium-wrapper .section-title {
            color: var(--white);
        }

        .contact-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            text-align: center;
        }

        .contact-text {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
            max-width: 600px;
            margin-bottom: 10px;
        }

        .contact-email-line {
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.8);
        }

        .contact-info-link {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .contact-info-link:hover {
            color: var(--white);
            text-shadow: 0 0 10px rgba(214, 175, 55, 0.5);
        }

        .btn-whatsapp-live {
            background-color: #25D366;
            color: var(--white);
            padding: 14px 32px;
            text-decoration: none;
            font-weight: 600;
            border-radius: 4px;
            font-size: 1rem;
